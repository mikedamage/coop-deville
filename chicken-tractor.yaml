substitutions:
  name: chicken-tractor
  logger_level: DEBUG
  friendly_name: Chicken Tractor
  lora_module_id: sx126x_module
  lora_pa_power: 10
  lora_bandwidth: 125_0kHz
  lora_frequency: 917500000 # 917.5 MHz
  lora_spreading_factor: 7
  lora_coding_rate: CR_4_5

packages:
  - !include includes/common.yaml
  # - !include includes/debug.yaml
  - !include includes/ha-time.yaml
  - !include includes/diagnostic-sensors.yaml
  - !include includes/heltec-display.yaml
  - !include includes/heltec-lora.yaml

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  area: Pasture
  includes:
    - includes/temperature.h
    - includes/charging_helpers.h
  on_boot:
    - priority: 300
      then:
        - logger.log: 'Turning on display after boot for 60s'
        - lambda: 'id(display_on) = true;'
        - delay: 60s
        - lambda: 'id(display_on) = false;'

esp32:
  board: heltec_wifi_lora_32_V3
  variant: esp32s3
  cpu_frequency: 160MHz
  flash_size: 8MB
  framework:
    # type: esp-idf
    type: arduino
    version: "3.3.2"

api:
  reboot_timeout: 0s

wifi:
  networks:
    - ssid: !secret outdoor_wifi_ssid
      password: !secret wifi_password
    - ssid: !secret outdoor_wifi_ssid_2
      password: !secret wifi_password
  power_save_mode: LIGHT
  output_power: 20dB
  # fast_connect: true
  reboot_timeout: 0s
  manual_ip:
    static_ip: 192.168.1.135
    gateway: 192.168.1.1
    subnet: 255.255.255.0

  # fallback hotspot when no networks in range
  ap:
    ssid: ${friendly_name}
    password: !secret hotspot_password

# one_wire:
#   - platform: gpio
#     id: one_wire_bus
#     pin: GPIO47
#

font:
  - file: "gfonts://Roboto+Mono"
    size: 10
    id: roboto_10
  - file: "gfonts://Material+Symbols+Outlined"
    id: material_symbols_14
    size: 14
    glyphs:
      - "\U0000EC0F" # solar_power
      - "\U0000E2AE" # charger (voltage)
      - "\U0000E29C" # airwave (current)
      - "\U0000F250" # battery_android_frame_bolt
      - "\U0000F24C" # battery_android_frame_share
      - "\U0000E669" # radio icon
      - "\U0000E9B8" # light bulb off (load off)
      - "\U0000E0F0" # light bulb (load on)

display:
  - id: !extend builtin_display
    lambda: |-
      if (!id(display_on)) {
        it.fill(COLOR_OFF);
      } else {
        it.print(0, 0, id(material_symbols_14), "\U0000F250");
        it.printf(16, 0, id(roboto_10), "%6.2fV", id(load_voltage).state);
        it.print(it.get_width() - 16, 0, id(material_symbols_14), id(load_switch).remote_values.is_on() ? "\U0000E0F0" : "\U0000E9B8");
        it.print(0, 15, id(material_symbols_14), "\U0000F24C");
        it.printf(16, 15, id(roboto_10), "%6.2fA", id(charge_current).state);
        it.print(0, 30, id(material_symbols_14), "\U0000EC0F");
        it.printf(16, 30, id(roboto_10), "%6.2fV", id(solar_voltage).state);
        it.printf(
          0,
          45,
          id(roboto_10),
          "PWM: %.1f%% (%.2fV)",
          id(charge_switch_state).state ? 0 : id(charger_duty_cycle).state, id(charge_voltage).state
        );
      }

packet_transport:
  - id: lora_packet_transport
    platform: sx126x
    sx126x_id: ${lora_module_id}
    encryption: !secret packet_transport_key
    update_interval: 30s
    providers:
      - name: lora-gateway
        encryption: !secret packet_transport_key
    sensors:
      - charge_voltage
      - charge_current
      - solar_voltage
      - load_current
      - load_voltage
      - charger_duty_cycle
      - charge_phase_int
      - uptime_seconds
    binary_sensors:
      - load_switch_state
      - charge_switch_state

# i2c for INA219 current sensor and BH1750 ambient light sensor
i2c:
  - sda: GPIO1
    scl: GPIO2
    id: sensor_bus
    scan: true

sun:
  latitude: !secret location_latitude
  longitude: !secret location_longitude

sensor:
  - platform: uptime
    name: "Uptime (seconds)"
    id: uptime_seconds
    entity_category: diagnostic
    update_interval: 60s

  - platform: sun
    name: Solar Elevation
    type: elevation
    id: sun_elevation
    internal: true
    icon: "mdi:sun-angle"

  - platform: sun
    name: Solar Azimuth
    type: azimuth
    id: sun_azimuth
    internal: true
    icon: "mdi:sun-compass"

  - platform: template
    name: "Charging Duty Cycle"
    id: charger_duty_cycle
    unit_of_measurement: "%"
    accuracy_decimals: 2
    lambda: |-
      return id(pwm_duty) / 255.0 * 100.0;
    # filters:
    #   - throttle: 30s

  - platform: template
    name: "Charge Phase"
    id: charge_phase_int

  - platform: ina219
    address: 0x40
    i2c_id: sensor_bus
    shunt_resistance: 0.1 ohm
    max_voltage: 14.8V
    max_current: 3.2A
    current:
      id: charge_current
      name: "Charge Current"
      unit_of_measurement: "A"
      accuracy_decimals: 2
      # filters:
      #   - throttle: 30s
    bus_voltage:
      name: "Charge Voltage"
      unit_of_measurement: "V"
      accuracy_decimals: 2
      id: charge_voltage
      # filters:
      #   - throttle: 30s
    shunt_voltage:
      name: "Charge Shunt Voltage"
      id: shunt_voltage
      unit_of_measurement: "V"
      # filters:
      #   - throttle: 30s
    power:
      name: "Charge Power"
      unit_of_measurement: "W"
      accuracy_decimals: 2
      id: charge_power
      # filters:
      #   - throttle: 30s
    update_interval: 5s

  - platform: ina219
    address: 0x41
    i2c_id: sensor_bus
    shunt_resistance: 0.1 ohm
    max_voltage: 14.8V
    max_current: 2.0A
    current:
      id: load_current
      name: "Load Current"
      unit_of_measurement: "A"
      accuracy_decimals: 2
      # filters:
      #   - throttle: 30s
    bus_voltage:
      name: "Battery Voltage"
      unit_of_measurement: "V"
      accuracy_decimals: 2
      id: load_voltage
      # filters:
      #   - throttle: 30s
    shunt_voltage:
      name: "Load Shunt Voltage"
      id: load_shunt_voltage
      unit_of_measurement: "V"
      # filters:
      #   - throttle: 30s
    power:
      name: "Load Power"
      unit_of_measurement: "W"
      accuracy_decimals: 2
      id: load_power
      # filters:
      #   - throttle: 30s
    update_interval: 5s

  - platform: adc
    pin: GPIO3
    name: "Solar Voltage"
    unit_of_measurement: "V"
    update_interval: 5s
    attenuation: 12db
    filters:
      - multiply: 11.0  # Voltage divider ratio (220k + 22k) / 22k
      - offset: -0.56 # subtract ADC gain setting noise from result
      - clamp: # there is a diode preventing reverse polarity, so minimum voltage of above cannot go below 0V
          min_value: 0
      #   - throttle: 30s
    id: solar_voltage

  # - platform: dallas_temp
  #   name: "Ambient Temperature"
  #   unit_of_measurement: "°C"
  #   accuracy_decimals: 2
  #   update_interval: 60s
  #   one_wire_id: one_wire_bus
  #   id: ambient_temp
  #   icon: "mdi:thermometer"

  # - platform: bh1750
  #   i2c_id: sensor_bus
  #   name: "Ambient Light"
  #   address: 0x23  # Default, change to 0x5C if ADDR pin is high
  #   update_interval: 60s
  #   id: ambient_light

# Outputs for MOSFET control (receivable via packet_transport)
output:
  - platform: ledc
    pin: GPIO4
    id: charge_pwm

  - platform: ledc
    pin: GPIO48
    id: load_switch_output

light:
  - platform: monochromatic
    output: charge_pwm
    id: charge_switch
    name: "Duty Cycle Control"
    default_transition_length: 0s

  - platform: monochromatic
    output: load_switch_output
    id: load_switch
    name: "LED Lamp"
    default_transition_length: 0s

