# Binary sensor for status
binary_sensor:
  - platform: status
    name: "ESP Status"

  - platform: template
    name: "Load Enable State"
    id: load_switch_state
    lambda: |-
      return id(load_switch).remote_values.is_on();

  - platform: template
    name: "Charge Enable State"
    id: charge_switch_state
    lambda: |-
      return id(charge_switch).remote_values.is_on();

  - platform: template
    id: remote_reboot
    internal: true
    on_press:
      - switch.turn_on: reboot_switch

  # Control signals received from gateway
  - platform: packet_transport
    provider: lora-gateway
    id: charge_control
    internal: true
    on_press:
      - light.turn_on: charge_switch
    on_release:
      - light.turn_off: charge_switch

  - platform: packet_transport
    provider: lora-gateway
    id: load_control
    internal: true
    on_press:
      - light.turn_on: load_switch
    on_release:
      - light.turn_off: load_switch

  - platform: gpio
    pin: GPIO0
    id: display_toggle
    filters:
      - delayed_on: 10ms
    on_double_click:
      then:
        - logger.log: "Toggling load switch"
        - light.toggle: load_switch
    on_press:
      then:
        - logger.log: 'Display toggle button pressed'
        - if:
            condition:
              lambda: 'return id(display_on);'
            then:
              - logger.log: 'Turning display off'
              - lambda: 'id(display_on) = false;'
            else:
              - logger.log: 'Turning display on for 60s'
              - lambda: 'id(display_on) = true;'
              - delay: 60s
              - logger.log: 'Sleeping display after 60s delay'
              - lambda: 'id(display_on) = false;'

text_sensor:
  - platform: template
    name: "Charge Phase"
    id: charge_phase_sensor
    icon: "mdi:battery-charging"

interval:
  - interval: 5s
    then:
      - logger.log: "Would execute duty cycle management script now"
      # - script.execute:
      #     id: duty_cycle_management
      #     battery_voltage: !lambda 'return id(load_voltage).state;'
      #     charge_current: !lambda 'return id(charge_current).state;'
      #     solar_voltage: !lambda 'return id(solar_voltage).state;'
      #     charge_power: !lambda 'return id(charge_power).state;'

globals:
  - id: prev_power
    type: float
    initial_value: '0.0'
    restore_value: no

  - id: pwm_duty
    type: int
    initial_value: '128'
    restore_value: no

  - id: display_on
    type: bool
    initial_value: 'true'
    restore_value: no

  - id: load_manual_override
    type: bool
    initial_value: 'false'
    restore_value: yes

  - id: charge_phase
    type: std::string
    initial_value: '"OFF"'
    restore_value: no

script:
  - id: duty_cycle_management
    mode: single
    parameters:
      charge_current: float
      battery_voltage: float
      solar_voltage: float
      charge_power: float
    then:
      - lambda: |-
          // ========== PHASE DETERMINATION ==========
          std::string new_phase = "OFF";
          ChargePhase new_phase_int = Off;

          ESP_LOGD("charger", "beginning duty cycle management script");

          // If solar voltage is less than battery voltage, we're discharging
          if (solar_voltage < battery_voltage || (!id(charge_switch_state).state)) {
            new_phase = "DISCHARGING";
            new_phase_int = Discharging;
          }

          // Solar available and charging enabled - determine phase by voltage
          else {
            if (battery_voltage < 14.2) {
              new_phase = "BULK";
              new_phase_int = Bulk;
            } else if (battery_voltage < 14.6) {
              new_phase = "ABSORPTION";
              new_phase_int = Absorption;
            } else {
              new_phase = "FLOAT";
              new_phase_int = Float;
            }
          }

          ESP_LOGD("charger", "new phase is %s", new_phase.c_str());

          // Update phase if changed
          if (id(charge_phase) != new_phase) {
            ESP_LOGI("charger", "Phase transition: %s -> %s (Vbat=%.2fV)",
                     id(charge_phase).c_str(), new_phase.c_str(), battery_voltage);
            id(charge_phase) = new_phase;
            id(charge_phase_sensor).publish_state(new_phase);
            id(charge_phase_int).publish_state(new_phase_int);
          }

          // ========== PWM CONTROL BY PHASE ==========
          if (new_phase == "OFF" || new_phase == "DISCHARGING") {
            // No charging - set PWM to zero
            if (id(pwm_duty) != 0) {
              id(pwm_duty) = 0;
              id(charge_pwm).set_level(id(pwm_duty));
              ESP_LOGD("charger", "Charging disabled: %s", new_phase.c_str());
              id(charge_pwm).turn_off();
              return;
            }
          }
          else if (new_phase == "BULK") {
            // BULK: Maximize power using perturb-and-observe MPPT
            float current_power = battery_voltage * charge_current;

            if (current_power > id(prev_power)) {
              id(pwm_duty) += 5;
            } else {
              id(pwm_duty) -= 5;
            }

            // Constrain to reasonable range (min 20% to keep things moving)
            id(pwm_duty) = constrain(id(pwm_duty), 50, 255);

            // Safety limit: reduce if current exceeds 2A
            if (charge_current > 2.0) {
              id(pwm_duty) -= 10;
            }

            float duty = (float)id(pwm_duty) / 255.0;
            id(charge_pwm).set_level(duty);
            ESP_LOGD("charger", "BULK: PWM=%.2f, Power=%.2fW, Vbat=%.2fV, I=%.2fA",
                     duty, current_power, battery_voltage, charge_current);
            id(prev_power) = current_power;
          }
          else if (new_phase == "ABSORPTION") {
            // ABSORPTION: Hold voltage at ~14.4V (between 14.2-14.6V)
            if (battery_voltage > 14.5) {
              id(pwm_duty) -= 3;  // Reduce charging
            } else if (battery_voltage < 14.3) {
              id(pwm_duty) += 3;  // Increase charging
            }
            // else: voltage is in sweet spot, maintain current PWM

            id(pwm_duty) = constrain(id(pwm_duty), 10, 200);

            float duty = (float)id(pwm_duty) / 255.0;
            id(charge_pwm).set_level(duty);
            ESP_LOGD("charger", "ABSORPTION: PWM=%.2f, Vbat=%.2fV, I=%.2fA",
                     duty, battery_voltage, charge_current);
          }
          else if (new_phase == "FLOAT") {
            // FLOAT: Maintain battery at ~13.6V for trickle charge
            if (battery_voltage > 13.7) {
              id(pwm_duty) -= 3;
            } else if (battery_voltage < 13.5) {
              id(pwm_duty) += 3;
            }

            id(pwm_duty) = constrain(id(pwm_duty), 0, 80);  // Low PWM for float

            float duty = (float)id(pwm_duty) / 255.0;
            id(charge_pwm).set_level(duty);
            ESP_LOGD("charger", "FLOAT: PWM=%.2f, Vbat=%.2fV, I=%.2fA",
                     duty, battery_voltage, charge_current);
          }

      # Load management - turn off if battery too low
      - if:
          condition:
            and:
              - light.is_on: load_switch
              - lambda: 'return battery_voltage < 11.0;'
          then:
            - light.turn_off: load_switch
            - logger.log:
                format: "Low battery voltage (%.2f < 10.8V). Turning off load switch."
                args: ['battery_voltage']

      # Load management - turn back on when battery recovered
      - if:
          condition:
            and:
              - light.is_off: load_switch
              - lambda: 'return battery_voltage > 12.0;'
              - lambda: 'return !id(load_manual_override);'
          then:
            - light.turn_on: load_switch
            - logger.log:
                format: "Battery voltage nominal (%.2f >= 12.0V) - turning on load switch"
                args: ['battery_voltage']

