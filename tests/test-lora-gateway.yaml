# Test configuration for lora_gateway component
# This is used to verify Phase 1 compiles correctly

external_components:
  - source:
      type: local
      path: ../components

substitutions:
  name: test-lora-gateway
  logger_level: DEBUG
  friendly_name: Test LoRa Gateway
  lora_module_id: sx126x_module
  lora_pa_power: "10"
  lora_bandwidth: 125_0kHz
  lora_frequency: "917500000"
  lora_spreading_factor: "7"
  lora_coding_rate: CR_4_5

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: heltec_wifi_lora_32_V3
  variant: esp32s3
  framework:
    type: arduino

logger:
  level: ${logger_level}

# WiFi not needed for compile test, but required for api
wifi:
  ssid: "TestNetwork"
  password: "testpassword"

api:

spi:
  clk_pin: GPIO9
  mosi_pin: GPIO10
  miso_pin: GPIO11
  interface: hardware

sx126x:
  - id: ${lora_module_id}
    cs_pin: GPIO8
    rst_pin: GPIO12
    busy_pin: GPIO13
    dio1_pin: GPIO14
    pa_power: ${lora_pa_power}
    bandwidth: ${lora_bandwidth}
    modulation: LORA
    crc_enable: true
    frequency: ${lora_frequency}
    hw_version: sx1262
    rf_switch: false
    spreading_factor: ${lora_spreading_factor}
    coding_rate: ${lora_coding_rate}
    tcxo_voltage: 1_8V
    tcxo_delay: 5ms
    sync_value: [0x14, 0x24]

time:
  - platform: sntp
    id: sntp_time
    timezone: America/New_York

lora_gateway:
  id: lora_gw
  sx126x_id: ${lora_module_id}
  address: 0x01
  auth_key: "0102030405060708090a0b0c0d0e0f10"
  response_timeout: 2s
  poll_interval: 10s
  time_id: sntp_time
  time_sync_interval: 60s
  send_ack: false
  stale_sensor_behavior: keep
  remote_nodes:
    - id: test_node_1
      address: 0x02
      name: Test Node 1
    - id: test_node_2
      address: 0x03
      name: Test Node 2

text_sensor:
  - platform: lora_gateway
    lora_gateway_id: lora_gw
    timeout_list:
      name: "Gateway Timeout List"
    last_heard_list:
      name: "Gateway Last Heard"
    signal_quality_list:
      name: "Gateway Signal Quality"
